<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Records</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
        }

        header {
            background: #0077b6;
            color: white;
            padding: 15px;
        }

        .container {
            padding: 20px;
        }

        button {
            padding: 10px 15px;
            margin: 10px;
            border: none;
            background: #0077b6;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #023e8a;
        }

        .back-btn {
            position: absolute;
            left: 10px;
            top: 10px;
        }

        .records-box {
            background: white;
            padding: 20px;
            max-width: 600px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            text-align: left;
        }

        .record {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .record:last-child {
            border-bottom: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .records-box {
                width: 90%;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Medical Records</h1>
</header>

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<div class="container">
    <div class="records-box">
        <h2>Patient Records</h2>

        <div id="recordsList">
            <!-- Records will appear here -->
        </div>

        <button onclick="loadSampleData()">Load Sample Records</button>
    </div>
</div>

<script>
    function goBack() {
        window.history.back();
    }

    function loadSampleData() {
        let records = [
            {name: "John Banda", age: 30, condition: "Flu"},
            {name: "Mary Phiri", age: 25, condition: "Malaria"},
            {name: "Peter Zulu", age: 40, condition: "Diabetes"}
        ];

        let container = document.getElementById("recordsList");
        container.innerHTML = "";

        records.forEach(record => {
            let div = document.createElement("div");
            div.className = "record";
            div.innerHTML = `
                <strong>Name:</strong> ${record.name} <br>
                <strong>Age:</strong> ${record.age} <br>
                <strong>Condition:</strong> ${record.condition}
            `;
            container.appendChild(div);
        });
    }
</script>

</body>
</html>
